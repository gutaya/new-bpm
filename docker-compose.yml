# ===========================================
# Docker Compose for BPM USNI
# Port: 2018
# Build: npm run build (local)
# ===========================================

services:
  bpm-usni:
    build:
      context: .
      dockerfile: Dockerfile
      # Enable BuildKit for cache mounts
      args:
        BUILDKIT_INLINE_CACHE: 1
    
    container_name: bpm-usni-app
    
    restart: unless-stopped
    
    ports:
      - "2018:2018"
    
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/db/custom.db
      - NEXT_TELEMETRY_DISABLED=1
      - HOSTNAME=0.0.0.0
      - PORT=2018
    
    volumes:
      - ./db:/app/db
      - ./public/uploads:/app/public/uploads
    
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2018/api/identity"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
