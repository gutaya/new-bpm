# ===========================================
# Docker Compose for BPM USNI
# IP Binding: 10.8.0.1
# ===========================================

version: '3.8'

services:
  # ===========================================
  # Next.js Application
  # ===========================================
  bpm-usni:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bpm-usni-app
    restart: unless-stopped
    
    # Network Configuration - IP Binding 10.8.0.1
    networks:
      bpm_network:
        ipv4_address: 10.8.0.1
    
    # Port Mapping
    ports:
      - "2018:2018"
    
    # Environment Variables
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/db/custom.db
      - NEXT_TELEMETRY_DISABLED=1
      - HOSTNAME=0.0.0.0
      - PORT=2018
    
    # Volume Mounts - Persist Data
    volumes:
      # Database persistence
      - ./db:/app/db
      # Upload/Media files persistence
      - ./public/uploads:/app/public/uploads
      # Prisma schema (for migrations)
      - ./prisma:/app/prisma:ro
    
    # Health Check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2018/api/identity"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ===========================================
# Network Configuration
# ===========================================
networks:
  bpm_network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 10.8.0.0/24
          gateway: 10.8.0.254

# ===========================================
# Volume Configuration (Optional - for named volumes)
# ===========================================
# volumes:
#   db_data:
#   uploads_data:
