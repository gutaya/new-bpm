# ===========================================
# Docker Compose for BPM USNI
# Port: 2018 | IP Binding: 10.8.0.1
# Network: global_usni_network
# ===========================================

services:
  # ===========================================
  # BPM USNI Next.js Application
  # ===========================================
  bpm-usni:
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: bpm-usni-app
    
    restart: unless-stopped
    
    # Network Configuration
    networks:
      global_usni_network:
        ipv4_address: 10.8.0.1
    
    # Port Mapping - Port 2018
    ports:
      - "2018:2018"
    
    # Environment Variables
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/db/custom.db
      - NEXT_TELEMETRY_DISABLED=1
      - HOSTNAME=0.0.0.0
      - PORT=2018
      - NEXT_PUBLIC_APP_URL=http://10.8.0.1:2018
    
    # Volume Mounts - Persist Data
    volumes:
      # Database persistence - critical for data retention
      - ./db:/app/db
      # Upload/Media files persistence - images, documents
      - ./public/uploads:/app/public/uploads
    
    # Health Check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2018/api/identity"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    
    # Logging Configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

# ===========================================
# Network Configuration
# Using external network: global_usni_network
# ===========================================
networks:
  global_usni_network:
    external: true
